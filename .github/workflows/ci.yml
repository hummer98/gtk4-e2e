name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libglib2.0-dev \
            pkg-config \
            build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo build
      - run: cargo test --all
      - name: Codegen stale check (proto.rs → JSON Schema)
        run: |
          cargo run -p gtk4-e2e-server --example gen-schemas --features e2e
          if ! git diff --exit-code packages/server/proto/schemas/; then
            echo "::error::JSON Schema is stale. Run 'task gen:types' (or 'bun run gen:types') and commit packages/server/proto/schemas/."
            exit 1
          fi

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: TS codegen smoke (JSON Schema → types.gen.ts)
        run: |
          # JSON Schemas are committed; this job has no rust toolchain, so we
          # only exercise the TS half of the pipeline against the checked-in
          # schema artifacts.
          bun packages/client/scripts/gen-types.ts
          grep -q "export interface Info" packages/client/src/types.gen.ts
          grep -q "Capability" packages/client/src/types.gen.ts
      - run: bun test --pass-with-no-tests
