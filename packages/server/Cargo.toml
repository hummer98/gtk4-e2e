[package]
name = "gtk4-e2e-server"
version = "0.0.0"
edition = "2021"
publish = false
description = "In-process e2e test server for GTK4 + Rust apps. Step 1 spike."

[lib]
path = "src/lib.rs"

[dependencies]
gtk4 = { version = "0.9", optional = true, default-features = false, features = ["v4_6"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "net", "time"], optional = true }
axum = { version = "0.7", optional = true, features = ["ws"] }
futures-util = { version = "0.3", optional = true, default-features = false, features = ["sink"] }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
schemars = { version = "0.8", optional = true }
uuid = { version = "1", features = ["v4"], optional = true }
rand = { version = "0.8", optional = true }
anyhow = { version = "1", optional = true }
thiserror = { version = "1", optional = true }
time = { version = "0.3", features = ["formatting", "macros"], optional = true }

[features]
default = []
e2e = [
    "dep:gtk4",
    "dep:tokio",
    "dep:axum",
    "dep:futures-util",
    "dep:serde",
    "dep:serde_json",
    "dep:schemars",
    "dep:uuid",
    "dep:rand",
    "dep:anyhow",
    "dep:thiserror",
    "dep:time",
]

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[[example]]
name = "gen-schemas"
required-features = ["e2e"]
